<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Cascadia Mono -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Cascadia Mono</string>
    </test>

    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hintstyle" mode="assign">
      <const>hintfull</const>
    </edit>

    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>

    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

  <!-- Azukifont -->
  <match target="font">
    <test name="family" compare="eq">
      <string>azukifontB</string>
    </test>

    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hintstyle" mode="assign">
      <const>hintfull</const>
    </edit>

    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>

    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

  <!-- Mochiy Pop One -->
  <match target="font">
    <test name="family" compare="eq">
      <string>Mochiy Pop One</string>
    </test>

    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>

    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>

    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
  </match>

</fontconfig>

